name: DraftKit
options:
  bundleIdPrefix: com.draftkit
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"

settings:
  base:
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: ""

targets:
  DraftKit:
    type: application
    platform: iOS
    sources:
      - DraftKit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.draftkit.app
        INFOPLIST_FILE: DraftKit/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    dependencies: []
